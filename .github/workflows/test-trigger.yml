name: Firmware Test

on:
  workflow_dispatch:
    inputs:
      firmware_file: 
        required: true
      version:
        required: true
      major:
        required: true
      minor:
        required: true
          
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FIRMWARE_FILE: ${{ github.event.inputs.firmware_file }}
      FW_VERSION: ${{ github.event.inputs.version }}
      FW_MAJOR: ${{ github.event.inputs.major }}
      FW_MINOR: ${{ github.event.inputs.minor }}

    steps:
      - uses: actions/checkout@v4

      - name: Show Firmware Info
        run: |
          echo "Firmware: $FIRMWARE_FILE"
          echo "Version: $FW_VERSION"
          echo "Major: $FW_MAJOR"
          echo "Minor: $FW_MINOR"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke pytest
        run: |
          pytest test_message_monitoring_for_24hours.py -q --junitxml=results.xml
