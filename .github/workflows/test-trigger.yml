name: Firmware Test

on:
  workflow_dispatch:
    inputs:
      firmware_file: 
        description: firmware filename
        required: true
        type: string
      version:
        description: version string
        required: true
        type: string
      major:
        description: major version
        required: true
        type: string
      minor:
        description: minor version
        required: true
        type: string
          
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FIRMWARE_FILE: ${{ github.event.inputs.firmware_file }}
      FW_VERSION: ${{ github.event.inputs.version }}
      FW_MAJOR: ${{ github.event.inputs.major }}
      FW_MINOR: ${{ github.event.inputs.minor }}

    steps:
      - uses: actions/checkout@v4

      - name: Show Firmware Info
        run: |
          echo "Firmware: $FIRMWARE_FILE"
          echo "Version: $FW_VERSION"
          echo "Major: $FW_MAJOR"
          echo "Minor: $FW_MINOR"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug layout
        run: |
          pwd
          ls -la
          ls -la tests || true
          ls -la infra || true

      - name: Run smoke pytest
        run: |
          pytest test_message_monitoring_for_24hours.py -q --junitxml=results.xml

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: results.xml
